description: >-
  FinOps view of Backendless Cloud spend. Backendless does not meter API calls;
  instead the Scale plan bills daily based on the peak API requests-per-minute
  tier reached each day, while resource capacity (file storage, data tables,
  real-time connections) is governed by plan caps and incremental function
  packs. The Free plan carries no charge. Self-hosted Pro is free to license, and
  Managed Backendless is a negotiated subscription.
notes: >-
  Daily Scale billing is driven by peak requests-per-minute tiers; spikes in
  traffic move the account into higher daily tiers. Verify the current tier
  schedule and function-pack rates on the pricing page during reconciliation.
sources:
- https://backendless.com/pricing/backendless-cloud/
- https://backendless.com/introducing-scale-plan/
